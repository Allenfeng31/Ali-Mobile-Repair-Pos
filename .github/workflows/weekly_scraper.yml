name: Weekly Supplier Scraper

on:
  schedule:
    # Runs at 23:00 every Sunday (UTC)
    # Adjust time zone mapping if you want Sydney time (AEST is UTC+10)
    # 23:00 Sydney = 13:00 UTC
    - cron: '0 13 * * 0'
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt
          
      # If using Playwright beneath Scrapling
      - name: Install browser binaries
        run: |
          playwright install chromium

      - name: Run Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cd scraper
          python main.py
